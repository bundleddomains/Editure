<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Editure Lab v2</title>

<link rel="stylesheet" href="style.css">

<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
.thick-row {
  position: relative;
  display: flex;
  gap: 8px;
  align-items: center;
}

.thick-row input {
  flex: 1;
}

.thick-label {
  position: absolute;
  left: 8px;
  top: -14px;
  font-size: 12px;
  opacity: 0.7;
}

#codeOptions {
  width: 100%;
  display: none;
  height: 400px;
  margin-top: 8px;
}

#toolFrame {
  width: 100%;
  height: 100%;
  border: none;
  border-radius: 12px;
  background: #000;
}

.panel.horizontal {
  width: 700px;
  height: 350px;
}

/* WIDTH / HEIGHT OUTSIDE PREVIEW */
.preview-size-controls {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 20;
}

.preview-size-controls label {
  position: absolute;
  color: #000;
  font-weight: bold;
  font-size: 18px;
  pointer-events: auto;
}

.preview-size-controls input {
  background: #000;
  color: white;
  border: none;
  outline: none;
  border-radius: 8px;
  width: 70px;
  padding: 6px 8px;
  font-family: monospace;
}

/* H outside left of preview */
.height-size {
  left: -54px;
  top: 48%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

/* W outside bottom of preview */
.width-size {
  bottom: -58px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 6px;
}
</style>

<script>
if (!window.location.search.includes("r=")) {
  window.location.replace(window.location.pathname + "?r=" + Date.now());
}
</script>

</head>

<body>

<div id="bar">

  <div class="row">
    <button id="paste">Paste</button>
    <button id="run">Run</button>
    <button id="clear">Clear</button>
    <button id="stop">Stop</button>
    <button id="toggleCode">Code</button>
    <button id="bg">BG</button>
    <button id="toggleLayout">Horizontal</button>
  </div>

  <div id="codeOptions">
    <iframe
      id="toolFrame"
      src="htmlo/index.html"
      title="HTMLO Tool">
    </iframe>
  </div>

  <div class="row" id="layers"></div>

  <div class="row">
    <label>X <input type="range" id="rotX" min="-60" max="60" value="0"></label>
    <label>Y <input type="range" id="rotY" min="-180" max="180" value="0"></label>
  </div>

  <div class="row">
    <label style="width:100%">Camera Orbit
      <input type="range" id="orbit" min="-180" max="180" value="0">
    </label>
  </div>

  <div class="row thick-row">
    <span class="thick-label">Thick</span>
    <input type="range" id="thick" min="-500" max="500" value="0">
    <input type="range" id="thick2" min="-500" max="500" value="0">
  </div>

</div>

<textarea id="code" placeholder="paste code here" style="display:none;"></textarea>

<div id="wrap">
  <div class="scene">
    <div class="viewer" id="viewer">

      <div class="preview-size-controls">
        <label class="height-size">
          H
          <input id="artH" type="number" placeholder="0">
        </label>

        <label class="width-size">
          W
          <input id="artW" type="number" placeholder="0">
        </label>
      </div>

      <div class="panel" id="panel">
        <iframe
          id="pv"
          sandbox="allow-scripts allow-same-origin"
          scrolling="no">
        </iframe>
      </div>

    </div>
  </div>
</div>

<script src="renderer.js"></script>
<script src="app.js"></script>

</body>
</html>
